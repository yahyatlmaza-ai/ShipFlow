<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleknyyy Store - تسوق بأمان وثقة</title>
    <!-- Bootstrap RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #f59e0b;
            --success: #10b981;
        }
        body {
            background: #f1f5f9;
            font-family: 'Tajawal', sans-serif;
        }
        .navbar {
            background: white;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            padding: 1rem 0;
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5rem 0;
            border-radius: 0 0 3rem 3rem;
            margin-bottom: 3rem;
        }
        .stat-card {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
        }
        .category-card {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 2px solid transparent;
        }
        .category-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(37,99,235,0.15);
        }
        .category-card.active {
            border-color: var(--primary);
            background: #eff6ff;
        }
        .category-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        .product-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.3s;
            height: 100%;
            border: 1px solid #e2e8f0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 50px rgba(0,0,0,0.15);
        }
        .product-image {
            height: 220px;
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: #94a3b8;
            overflow: hidden;
        }
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
        }
        .btn-order {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            border: none;
            border-radius: 2rem;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        .btn-order:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(16,185,129,0.3);
            color: white;
        }
        .btn-outline-primary {
            border-radius: 2rem;
            padding: 0.6rem 1.5rem;
        }
        .search-box {
            background: white;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            width: 300px;
        }
        .search-box input {
            border: none;
            outline: none;
            width: 100%;
            padding: 0.3rem 0.5rem;
        }
        .search-box button {
            background: none;
            border: none;
            color: var(--primary);
        }
        .footer {
            background: white;
            padding: 2rem 0;
            margin-top: 4rem;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }

        /* ===== صفحة المنتج ===== */
        .product-page {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-details {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .main-image {
            width: 100%;
            height: 400px;
            border-radius: 1.5rem;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .main-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumbnail-list {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 0.5rem 0;
        }

        .thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .thumbnail:hover {
            border-color: var(--primary);
        }

        .thumbnail.active {
            border-color: var(--primary);
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .product-price-large {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }

        .product-price-large::after {
            content: ' د.ج';
            font-size: 1.5rem;
        }

        .product-description {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #475569;
            margin-bottom: 2rem;
        }

        .btn-order-large {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            border: none;
            border-radius: 3rem;
            padding: 1.2rem 3rem;
            font-size: 1.3rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-order-large:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(16,185,129,0.3);
        }

        .btn-wishlist {
            background: white;
            color: #ef4444;
            border: 2px solid #ef4444;
            border-radius: 3rem;
            padding: 1.2rem 2rem;
            font-size: 1.3rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 1rem;
        }

        .btn-wishlist:hover {
            background: #ef4444;
            color: white;
        }

        .btn-wishlist.active {
            background: #ef4444;
            color: white;
        }

        /* ===== نافذة الطلب ===== */
        .order-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            padding: 1rem;
            overflow-y: auto;
        }

        .order-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .order-content {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-close {
            width: 40px;
            height: 40px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .product-preview {
            display: flex;
            gap: 1rem;
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
        }

        .preview-img {
            width: 80px;
            height: 80px;
            border-radius: 1rem;
            overflow: hidden;
        }

        .preview-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            margin-bottom: 1rem;
            font-family: 'Tajawal', sans-serif;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            outline: none;
        }

        /* ===== شوهد مؤخراً ===== */
        .recent-sidebar {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 300px;
            background: white;
            border-radius: 1.5rem;
            padding: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 999;
            transform: translateX(350px);
            transition: transform 0.3s;
        }

        .recent-sidebar.show {
            transform: translateX(0);
        }

        .recent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .recent-item {
            display: flex;
            gap: 0.8rem;
            padding: 0.5rem;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .recent-item:hover {
            background: #f1f5f9;
            border-radius: 0.5rem;
        }

        .recent-item img {
            width: 50px;
            height: 50px;
            border-radius: 0.5rem;
            object-fit: cover;
        }

        /* ===== أزرار ثابتة ===== */
        .fixed-buttons {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 998;
        }

        .action-btn {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.3rem;
            box-shadow: 0 5px 20px rgba(37,99,235,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-btn:hover {
            transform: scale(1.1);
        }

        /* ===== الوضع الليلي ===== */
        [data-theme="dark"] {
            background: #0f172a;
            color: white;
        }

        [data-theme="dark"] .navbar,
        [data-theme="dark"] .product-card,
        [data-theme="dark"] .category-card,
        [data-theme="dark"] .product-details,
        [data-theme="dark"] .order-content,
        [data-theme="dark"] .recent-sidebar,
        [data-theme="dark"] .footer {
            background: #1e293b;
            color: white;
            border-color: #334155;
        }

        [data-theme="dark"] .nav-link {
            color: white;
        }

        [data-theme="dark"] .form-control,
        [data-theme="dark"] .form-select {
            background: #334155;
            border-color: #475569;
            color: white;
        }

        [data-theme="dark"] .search-box {
            background: #334155;
        }

        [data-theme="dark"] .search-box input {
            background: #334155;
            color: white;
        }

        /* ===== تحميل ===== */
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== مؤقت العروض ===== */
        .countdown-timer {
            background: linear-gradient(135deg, var(--secondary), #f97316);
            color: white;
            padding: 0.5rem;
            border-radius: 2rem;
            text-align: center;
            margin: 1rem 0;
            font-weight: 700;
        }

        /* ===== أيقونات الثقة ===== */
        .trust-badges {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .trust-item {
            text-align: center;
        }

        .trust-icon {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        /* ===== قسم التقييمات ===== */
        .reviews-section {
            margin-top: 2rem;
            padding: 2rem;
            background: #f8fafc;
            border-radius: 1.5rem;
        }

        .review-item {
            background: white;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #e2e8f0;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .review-rating {
            color: #f59e0b;
        }

        .review-form {
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            margin-top: 1.5rem;
        }

        .star-rating {
            direction: ltr;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .star-rating i {
            color: #f59e0b;
        }
    </style>
</head>
<body>
    <!-- شريط العروض -->
    <div class="countdown-timer" id="flashSaleTimer">

    <!-- شريط التنقل -->

                <span class="navbar-toggler-icon"></span>

                </div>
            </div>
        </div>
    </nav>

    <!-- أيقونات الثقة -->
    <div class="trust-badges">
        <div class="trust-item">
            <div class="trust-icon"><i class="fas fa-truck"></i></div>
            <div>توصيل سريع</div>
        </div>
        <div class="trust-item">
            <div class="trust-icon"><i class="fas fa-shield-alt"></i></div>

        <div class="trust-item">
            <div class="trust-icon"><i class="fas fa-headset"></i></div>

    </div>

    <!-- أزرار ثابتة -->
    <div class="fixed-buttons">
        <button class="action-btn" onclick="toggleTheme()">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <button class="action-btn" onclick="toggleRecent()">
            <i class="fas fa-history"></i>
        </button>
        <button class="action-btn" onclick="showWishlist()">
            <i class="fas fa-heart"></i>
        </button>
    </div>

    <!-- شوهد مؤخراً -->
    <div class="recent-sidebar" id="recentSidebar">
        <div class="recent-header">
            <h6><i class="fas fa-history"></i> شوهد مؤخراً</h6>
            <i class="fas fa-times" onclick="toggleRecent()" style="cursor: pointer;"></i>
        </div>
        <div id="recentList"></div>
    </div>

    <!-- نافذة الطلب -->
    <div class="order-modal" id="orderModal">
        <div class="order-content">
            <div class="modal-header">
                <h5>📝 طلب جديد</h5>
                <button class="modal-close" onclick="closeOrderModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="product-preview" id="orderPreview"></div>

            <form id="orderForm" onsubmit="event.preventDefault(); submitOrder();">
                <input type="hidden" id="orderProductId">
                <input type="hidden" id="orderProductName">
                <input type="hidden" id="orderProductPrice">
                <input type="hidden" id="orderProductImage">
                
                <input type="text" class="form-control" id="orderName" placeholder="الاسم الكامل" required>
                <input type="tel" class="form-control" id="orderPhone" placeholder="رقم الهاتف" required>
                
                <select class="form-select" id="orderWilaya" required>
                    <option value="">اختر الولاية</option>
                </select>
                
                <textarea class="form-control" id="orderAddress" rows="2" placeholder="العنوان بالتفصيل" required></textarea>
                <textarea class="form-control" id="orderNotes" rows="2" placeholder="ملاحظات (اختياري)"></textarea>
                
                <button type="submit" class="btn btn-primary w-100" style="background: #10b981; border: none; padding: 0.8rem; border-radius: 30px;">
                    تأكيد الطلب
                </button>
            </form>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <main id="mainContent">
        <div class="loader">
            <div class="spinner"></div>
        </div>
    </main>

    <!-- تذييل -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-0">جميع الحقوق محفوظة &copy; 2025 Seleknyyy Store</p>
        </div>
    </footer>

        // مؤقت العروض
        function initCountdown() {
            let timeLeft = 24 * 60 * 60; // 24 ساعة
            setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    const hours = Math.floor(timeLeft / 3600);
                    const minutes = Math.floor((timeLeft % 3600) / 60);
                    const seconds = timeLeft % 60;
                    document.getElementById('timer').textContent = 
                        `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        // إنشاء عنصر تقييم
        function createReviewItem(review) {
            return `
                <div class="review-item">
                    <div class="review-header">

                        <span class="review-rating">${'⭐'.repeat(review.rating)}</span>

        // تعيين التقييم
        function setRating(rating) {
            document.getElementById('reviewRating').value = rating;
            const stars = document.querySelectorAll('.star-rating i');
            stars.forEach((star, index) => {
                star.style.color = index < rating ? '#f59e0b' : '#ddd';
            });
        }

        // إضافة تقييم
        function addReview(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;

            const rating = parseInt(document.getElementById('reviewRating').value);
            const comment = document.getElementById('reviewComment').value;
            const name = document.getElementById('reviewName').value;

            if (!comment || !name) {
                Swal.fire('خطأ', 'الرجاء ملء جميع الحقول', 'error');
                return;
            }

            if (!product.reviews) product.reviews = [];
            
            product.reviews.push({
                name,
                rating,
                comment,
                date: new Date().toISOString()
            });

            Swal.fire('تم', 'تم إضافة تقييمك بنجاح', 'success');
            showProductPage(productId);
        }

            const order = {
                productId: document.getElementById('orderProductId').value,
                productName: document.getElementById('orderProductName').value,
                productPrice: document.getElementById('orderProductPrice').value,
                productImage: document.getElementById('orderProductImage').value,

                customerPhone: document.getElementById('orderPhone').value,
                customerWilaya: document.getElementById('orderWilaya').value,
                customerAddress: document.getElementById('orderAddress').value,
                notes: document.getElementById('orderNotes').value,
                status: 'جديد',
                orderDate: new Date().toISOString(),
                orderNumber: 'ORD-' + Date.now().toString().slice(-6)

            if (!order.customerName || !order.customerPhone || !order.customerWilaya || !order.customerAddress) {
                Swal.fire('خطأ', 'الرجاء ملء جميع الحقول', 'error');
                return;

            Swal.fire({

                    <p>سيتم التواصل معك قريباً</p>
                `,
                confirmButtonText: 'حسناً'
            });
            closeOrderModal();
        }

        // المفضلة
        function toggleWishlist(productId) {
            const index = wishlist.indexOf(productId);
            if (index === -1) {
                wishlist.push(productId);
                Swal.fire('❤️', 'تمت الإضافة إلى المفضلة', 'success');
            } else {
                wishlist.splice(index, 1);
                Swal.fire('💔', 'تمت الإزالة من المفضلة', 'info');
            }
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            
            const btn = document.querySelector('.btn-wishlist');
            if (btn) btn.classList.toggle('active');
        }

        function showWishlist() {
            const wishlistProducts = allProducts.filter(p => wishlist.includes(p.id));
            
            if (wishlistProducts.length === 0) {
                Swal.fire('المفضلة', 'لا توجد منتجات في المفضلة', 'info');
                return;
            }

            let items = wishlistProducts.map(p => `
                <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem; padding: 0.5rem; border-bottom: 1px solid #e2e8f0;">
                    <img src="${p.image}" style="width: 50px; height: 50px; border-radius: 10px; object-fit: cover;">
                    <div>
                        <div>${p.name}</div>
                        <small>${p.price} د.ج</small>
                    </div>
                </div>
            `).join('');

            Swal.fire({
                title: '❤️ المفضلة',
                html: items,
                confirmButtonText: 'حسناً'
            });
        }

        // شوهد مؤخراً
        function addToRecent(productId) {
            recentProducts = [productId, ...recentProducts.filter(id => id !== productId)].slice(0, 5);
            localStorage.setItem('recentProducts', JSON.stringify(recentProducts));
            updateRecentPanel();
        }

        function updateRecentPanel() {
            const recent = allProducts.filter(p => recentProducts.includes(p.id));
            const container = document.getElementById('recentList');
            
            if (!container) return;

            if (recent.length === 0) {
                container.innerHTML = '<p class="text-center text-muted">لا توجد منتجات</p>';
            } else {
                container.innerHTML = recent.map(p => `
                    <div class="recent-item" onclick="showProductPage('${p.id}')">
                        <img src="${p.image}">
                        <div>
                            <div>${p.name}</div>
                            <small>${p.price} د.ج</small>
                        </div>
                    </div>
                `).join('');
            }
        }

        // الوضع الليلي
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-sun';
                localStorage.setItem('theme', 'dark');
            }
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('themeIcon').className = 'fas fa-sun';
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
